<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Prediction & Treatment RAG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  </head>
  <body>
     <h1 class="text-center mt-2" style="color: darkorange;"> 
      <img src="static/icon.png" alt="Icon" width="80" height="80" onerror="this.style.display='none'">
      Crop Citrus Disease Classification
      <img src="static/icon.png" alt="Icon" width="80" height="80" onerror="this.style.display='none'">
    </h1>
    
    <div class="container mt-3" style="background: rgb(249, 153, 0); color: white; border-radius: 15px; width:60%; padding: 2%; margin-bottom: 4%;">
        <h1 class="text-center">Image Prediction</h1>

        <form action="/" method="post" enctype="multipart/form-data" class="mb-4" style="padding-left: 2%; padding-right: 2%;">
            <label for="fileInput" class="form-label">Choose an image file:</label>
            <input type="file" id="fileInput" name="file" accept=".jpg, .jpeg, .png" class="form-control">
            <button type="submit" class="btn btn-success mt-2">Classify</button>
            <br> <br>

            {% if message %}
                <p class="text-danger mb-3">{{ message }}</p>
            {% endif %}

            {% if image_path %}
                <div class="d-flex flex-column align-items-center">
                  <img src="{{ image_path }}" alt="Uploaded Image" class="img-fluid rounded" style="max-height: 250px; object-fit: cover;">
                  <p class="mt-3">Actual Label: {{ actual_label }}</p>
                  <p>Predicted Label: {{ predicted_label }}</p>
                  <p class="mb-3">Confidence: {{ confidence }}%</p>
                </div>

                <div class="mt-3 p-3 bg-white text-dark rounded shadow-sm" style="width: 100%;">
                    <h5 style="color: #c2410c; font-weight: bold; border-bottom: 2px solid #f97316; padding-bottom: 5px;">
                        📋 Agronomic Treatment Guidelines (RAG)
                    </h5>
                    <p class="mt-2" style="white-space: pre-line; line-height: 1.6; font-size: 0.95rem;">
                        {{ treatment }}
                    </p>
                </div>
            {% endif %}
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
